name: Fashion Scraper

on:
  schedule:
    - cron: "0 3 * * *" # 3am UTC daily
  workflow_dispatch:
    inputs:
      scrape_mode:
        description: "Scrape Mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - full
      brand:
        description: "Single brand to run (leave empty to run all)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - zara-man
          - zara-woman
          - mango-man
          - mango-woman
          - massimo-dutti-man
          - massimo-dutti-woman

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300 # 5 hours — Zara jobs were hitting the 3hr limit and being hard-canceled mid-category
    strategy:
      fail-fast: false
      matrix:
        brand:
          - zara-man
          - zara-woman
          - mango-man
          - mango-woman
          - massimo-dutti-man
          - massimo-dutti-woman

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd clothing-backend && npm install

      - name: Install Chrome for Puppeteer
        run: cd clothing-backend && npx puppeteer browsers install chrome

      - name: Build
        run: cd clothing-backend && npm run build

      - name: Run scraper for ${{ matrix.brand }}
        # matrix context is only valid at step level, not job level
        if: inputs.brand == '' || inputs.brand == matrix.brand
        run: cd clothing-backend && node dist/scrapers/runNow.js ${{ matrix.brand }}
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
          NODE_ENV: production
          PORT: 10000
          SCRAPE_MODE: ${{ inputs.scrape_mode || 'daily' }}
