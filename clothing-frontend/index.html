<!doctype html>
<html lang="en">
  <head>
    <script>
      // 🛑 THE ROOT FIX: This runs before React or Tailwind even load!
      // It checks localStorage immediately and paints the background dark before a single pixel renders.
      if (
        localStorage.getItem("theme") === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/icons/favicon.svg?v=2" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"

    />
