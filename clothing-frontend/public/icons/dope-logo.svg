<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Dark charcoal square, rounded -->
  <rect width="80" height="80" rx="14" fill="#111110"/>

  <!-- Wordmark: "dope" in clean serif style -->
  <!-- Using Georgia as SVG fallback since Cormorant isn't embedded -->
  <text
    font-family="'Cormorant Garamond', Cormorant, Georgia, 'Times New Roman', serif"
    font-weight="300"
    font-size="22"
    letter-spacing="3"
    fill="#f0ede6"
    text-anchor="middle"
    x="40"
    y="50"
  >dope</text>
</svg>
