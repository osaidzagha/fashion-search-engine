<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Deep charcoal background with slight warmth -->
  <rect width="64" height="64" rx="12" fill="#111110"/>

  <!-- Letter D — clean, thin serif style -->
  <!-- Vertical stem -->
  <rect x="15" y="14" width="3.5" height="36" rx="1" fill="#f0ede6"/>

  <!-- D curve — the bowl -->
  <path
    d="M18.5 14 C34 14, 42 20, 42 32 C42 44, 34 50, 18.5 50"
    fill="none"
    stroke="#f0ede6"
    stroke-width="3.5"
    stroke-linecap="round"
  />

  <!-- Accent dot — small red dot bottom-right, brand colour -->
  <circle cx="50" cy="50" r="4" fill="#b94040"/>
</svg>
